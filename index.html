<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Morimoto Zhang — Selected Works</title>
<meta name="description" content="Independent designer — HMI, App, 3D, Tools. Selected works." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>document.documentElement.className+=' js-anim';</script>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>
<div class="progress" id="progress"></div>
<canvas id="bg"></canvas>
<div class="grain"></div>

<!-- nav -->
<nav id="nav">
  <a href="#top" class="brand" data-cursor>Morimoto Zhang</a>
  <div class="navlinks">
    <a href="#works" data-i18n="nav_works">Works</a>
    <a href="#contact" data-i18n="nav_contact">Contact</a>
  </div>
  <div class="navright">
    <div class="lang" id="lang">
      <button data-lang="en" class="on">EN</button>
      <button data-lang="zh">中</button>
    </div>
    <span class="badge-avail" data-cursor><span class="dot"></span> <span data-i18n="badge">Available for work</span></span>
    <div class="burger" id="burger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="mobmenu" id="mobmenu">
  <div class="cl" id="mmClose">Close ✕</div>
  <a href="#works" data-i18n="nav_works">Works</a>
  <a href="#contact" data-i18n="nav_contact">Contact</a>
  <div class="mf">moodoczh@gmail.com</div>
</div>

<!-- compact hero -->
<header class="hero" id="top">
  <div class="eyebrow reveal" data-i18n="hero_eyebrow">Selected Works — 2024 / 26</div>
  <h1 id="heroTitle" class="reveal"></h1>
  <p class="sub reveal" id="heroSub"></p>
</header>

<!-- works label -->
<div class="workshead" id="works">
  <span class="lbl" data-i18n="works_label">Selected Works</span>
  <span class="cnt" id="totalCount">00</span>
</div>

<!-- sticky filter / jump tabs -->
<div class="filterbar" id="filterbar">
  <div class="filter" id="filter"></div>
</div>

<!-- work sections (built by JS) -->
<main id="worksWrap"></main>

<!-- contact -->
<section class="contact" id="contact">
  <div class="kicker reveal" data-i18n="contact_kicker">Contact</div>
  <h2 class="reveal" id="contactTitle"></h2>
  <p class="lead reveal" id="contactLead"></p>
  <a href="mailto:moodoczh@gmail.com" class="mail reveal" data-cursor>moodoczh@gmail.com <span class="arw">↗</span></a>
</section>

<footer>
  <div class="brand2">© 2026 Morimoto Zhang</div>
  <div class="sig">Morimoto Zhang (Moodoc)</div>
  <div class="totop" id="totop" data-cursor data-i18n="to_top">Back to top</div>
</footer>

<script src="projects.js"></script>
<script src="main.js"></script>
</body>
</html>
